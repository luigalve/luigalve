<svg viewBox="0 0 760 84" width="760" height="84" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img">
<!-- Made with Foundry Studio. No script, no CSS animation, no external
     request. Motion is SMIL, which the SVG engine runs itself, so it
     survives mobile Safari, where CSS keyframes on SVG text and CSS
     filter on SVG do not. Delete every animation element below and the
     markup is still the finished picture: a renderer that ignores
     motion shows the right thing, not a blank or a half-state. -->
<style>@media(prefers-reduced-motion:reduce){.fsa{opacity:1 !important;transform:none !important}[stroke-dasharray]{stroke-dashoffset:0 !important}}</style>
  <line x1="-6" y1="22" x2="605" y2="22" fill="none" stroke="#393E41" stroke-width="39" stroke-dasharray="611" opacity="1"><animate attributeName="stroke-dashoffset" begin="0s" dur="4.6s" values="611;611;0" keyTimes="0;0.5652;1" calcMode="spline" keySplines="0 0 1 1;.25 .1 .25 1" fill="freeze"/></line>
  <line x1="-6" y1="63" x2="572" y2="63" fill="none" stroke="#393E41" stroke-width="39" stroke-dasharray="578" opacity="1"><animate attributeName="stroke-dashoffset" begin="0s" dur="6.6s" values="578;578;0" keyTimes="0;0.697;1" calcMode="spline" keySplines="0 0 1 1;.25 .1 .25 1" fill="freeze"/></line>
  <g class="fsa"><animateTransform attributeName="transform" type="translate" additive="sum" begin="0s" dur="4.9s" values="0,-40;0,-40;0,0" keyTimes="0;0.6327;1" calcMode="spline" keySplines="0 0 1 1;.25 .1 .25 1" fill="freeze"/><animate attributeName="opacity" begin="0s" dur="4.9s" values="0;0;1" keyTimes="0;0.6327;1" calcMode="spline" keySplines="0 0 1 1;.25 .1 .25 1" fill="freeze"/><text x="3" y="28" font-size="15" font-weight="600" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#f0e7d8" opacity="1">IT support technician. CompTIA A+ and Google IT Support certified.</text></g>
  <g class="fsa"><animateTransform attributeName="transform" type="translate" additive="sum" begin="0s" dur="6.8s" values="0,40;0,40;0,0" keyTimes="0;0.7353;1" calcMode="spline" keySplines="0 0 1 1;.25 .1 .25 1" fill="freeze"/><animate attributeName="opacity" begin="0s" dur="6.8s" values="0;0;1" keyTimes="0;0.7353;1" calcMode="spline" keySplines="0 0 1 1;.25 .1 .25 1" fill="freeze"/><text x="4" y="67" font-size="15" font-weight="600" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#f0e7d8" opacity="1">Currently preparing for the Azure Administrator exam (AZ-104).</text></g>
</svg>