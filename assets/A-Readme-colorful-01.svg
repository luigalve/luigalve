<!-- Made with Foundry Studio. No script, no CSS animation, no external
     request. Motion is SMIL, which the SVG engine runs itself, so it
     survives mobile Safari, where CSS keyframes on SVG text and CSS
     filter on SVG do not. Delete every animation element below and the
     markup is still the finished picture: a renderer that ignores
     motion shows the right thing, not a blank or a half-state. -->
<style>@media(prefers-reduced-motion:reduce){.fsa{opacity:1 !important;transform:none !important}[stroke-dasharray]{stroke-dashoffset:0 !important}}</style>
